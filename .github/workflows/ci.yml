name: CI Pipeline

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-push:
    runs-on: 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set Image Tag
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 
        working-directory: ./node-js-getting-started
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/nodejs-app:${IMAGE_TAG} .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/nodejs-app:${IMAGE_TAG}

      - name: Update Helm Values
        working-directory: ./node-js-getting-started
        run: |
          sed -i "s|tag: .*|tag: \"${IMAGE_TAG}\"|g" helm/nodejs-app/values.yaml

      - name: Commit Updated Helm Values
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add node-js-getting-started/helm/nodejs-app/values.yaml
          git commit -m "Update Helm image tag to ${IMAGE_TAG} [skip ci]" || echo "No changes"
          git push

      - name: Send Slack Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: "🚀 New version of NodeJS App deployed successfully via Helm GitOps!"
          SLACK_TITLE: "Deployment Status"
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
