name: CI Pipeline

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set Image Tag
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        working-directory: ./node-js-getting-started
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/nodejs-app:${IMAGE_TAG} .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/nodejs-app:${IMAGE_TAG}

      - name: Update Kubernetes Manifest
        working-directory: ./node-js-getting-started
        run: |
          sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME }}/nodejs-app:${IMAGE_TAG}|g" k8s/deployment.yaml

      - name: Commit Updated Manifest
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add node-js-getting-started/k8s/deployment.yaml
          git commit -m "Update image to ${IMAGE_TAG} [skip ci]" || echo "No changes"
          git push

      - name: Send Slack Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: "🚀 New version of NodeJS App deployed successfully via GitOps!"
          SLACK_TITLE: "Deployment Status"
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}